services:
  caddy-manager:
    build: .
    container_name: caddy-manager
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/n8n-install/caddy-addon:/data/addons:rw
      - /root/n8n-install/Caddyfile:/data/Caddyfile:ro
      - /proc:/host/proc:ro
    env_file:
      - .env
    environment:
      ADDON_DIR: /data/addons
      CADDY_CONTAINER: caddy
      BASE_DOMAIN: some-tools.org
      CADDYFILE_PATH: /data/Caddyfile
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=10M
    networks:
      - localai_default
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  localai_default:
    external: true
